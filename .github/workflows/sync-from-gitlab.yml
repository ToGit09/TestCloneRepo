name: Sync GitLab → GitHub

# Polls GitLab every 5 minutes and pushes any new commits / branches /
# tags to GitHub.  Can also be triggered manually via workflow_dispatch.
#
# Pushes performed by this workflow use GITHUB_TOKEN, which means they
# do NOT re-trigger other GitHub Actions workflows – this prevents an
# infinite sync loop between the two servers.
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (minimum allowed by GitHub)
  workflow_dispatch:          # allow manual triggering from the Actions tab

jobs:
  mirror:
    name: Pull from GitLab
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push GitLab changes back to this repository

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required to push correct commits

      - name: Set up SSH key for GitLab
        run: |
          mkdir -p ~/.ssh
          # Create the key file with correct permissions before writing the
          # secret so it is never briefly world-readable.
          install -m 600 /dev/null ~/.ssh/id_rsa
          printf '%s\n' "${{ secrets.GITLAB_SSH_KEY }}" > ~/.ssh/id_rsa
          # Use a pre-verified known_hosts entry stored as a secret.
          # To obtain the value, run locally:
          #   ssh-keyscan -H <GITLAB_HOST>
          # and store the output as the GITLAB_KNOWN_HOSTS secret.
          printf '%s\n' "${{ secrets.GITLAB_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Fetch all branches and tags from GitLab
        run: |
          git remote add gitlab "git@${{ secrets.GITLAB_HOST }}:${{ secrets.GITLAB_REPO_PATH }}.git"
          # Fetch branches and tags from GitLab directly into local refs so
          # that the subsequent push can address them by name.
          git fetch gitlab \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*' \
            --update-head-ok --prune

      - name: Push GitLab changes to GitHub
        run: |
          # Use GITHUB_TOKEN for authentication.  Pushes via this token do
          # not trigger further workflow runs, breaking the sync loop.
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'
